<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>טופס ראיון עבודה – מהנדס / מנהל עבודה בבנייה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root{
    --brand:#1f3a5f;
    --brand-2:#2f6fb0;
    --accent:#e8a33d;
    --bg:#eef2f6;
    --card:#ffffff;
    --line:#d7dee6;
    --ink:#1c2733;
    --muted:#5c6b7a;
    --ok:#1f8a54;
    --err:#c0392b;
    --wa:#25d366;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;font-family:'Heebo',system-ui,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;
    direction:rtl;text-align:right;
  }
  .wrap{max-width:840px;margin:0 auto;padding:24px 16px 100px}
  header.top{
    background:linear-gradient(135deg,var(--brand),var(--brand-2));
    color:#fff;border-radius:16px;padding:28px 26px;
    box-shadow:0 8px 26px rgba(31,58,95,.25);position:relative;overflow:hidden
  }
  header.top:after{content:"";position:absolute;inset-inline-start:-40px;top:-40px;
    width:160px;height:160px;background:var(--accent);opacity:.18;border-radius:50%}
  header.top h1{margin:0 0 6px;font-size:26px;font-weight:800;letter-spacing:-.2px}
  header.top p{margin:0;opacity:.9;font-size:15px}
  header.top .logo{position:absolute;inset-inline-end:22px;top:50%;transform:translateY(-50%);
    max-height:50px;max-width:140px;border-radius:8px;object-fit:contain;background:rgba(255,255,255,.92);padding:6px 10px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:22px 22px 8px;margin-top:18px;box-shadow:0 2px 8px rgba(28,39,51,.05)
  }
  .card h2{
    font-size:18px;margin:0 0 4px;color:var(--brand);
    display:flex;align-items:center;gap:10px
  }
  .card h2 .num{
    background:var(--brand);color:#fff;width:28px;height:28px;border-radius:8px;
    display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex:0 0 auto
  }
  .section-title{
    margin:26px 4px 0;font-size:20px;font-weight:800;color:var(--brand);
    border-inline-start:5px solid var(--accent);padding-inline-start:12px
  }
  .q{margin:16px 0}
  .q label{display:block;font-weight:600;margin-bottom:8px;font-size:15.5px}
  .q .req{color:var(--err);font-weight:700}
  input[type=text],input[type=tel],input[type=email],textarea{
    width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 14px;
    font-family:inherit;font-size:16px;background:#fbfcfe;color:var(--ink);
    transition:border-color .15s,box-shadow .15s;direction:rtl;text-align:right;
    -webkit-appearance:none
  }
  textarea{min-height:110px;resize:vertical}
  input:focus,textarea:focus{outline:none;border-color:var(--brand-2);
    box-shadow:0 0 0 3px rgba(47,111,176,.15);background:#fff}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .scenario{
    background:#f4f8fc;border:1px dashed var(--brand-2);border-radius:10px;
    padding:12px 14px;margin:8px 0 12px;font-size:14.5px;color:#22384f
  }
  .upload-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .drop{
    border:2px dashed var(--line);border-radius:12px;padding:18px;text-align:center;
    background:#fbfcfe;cursor:pointer;transition:.15s;display:block
  }
  .drop:hover,.drop:active{border-color:var(--brand-2);background:#f4f8fc}
  .drop b{color:var(--brand);display:block;margin-bottom:4px}
  .drop small{color:var(--muted)}
  .drop input{display:none}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .thumbs .t{position:relative;width:74px;height:74px;border-radius:8px;overflow:hidden;
    border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center}
  .thumbs .t img{width:100%;height:100%;object-fit:cover}
  .thumbs .t .file-ic{font-size:11px;color:var(--muted);padding:4px;text-align:center;word-break:break-all}
  .thumbs .t button{position:absolute;top:2px;inset-inline-start:2px;background:rgba(192,57,43,.92);
    color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:14px;line-height:1;
    display:flex;align-items:center;justify-content:center}
  .actions{position:sticky;bottom:0;margin-top:26px;display:flex;gap:12px;flex-wrap:wrap;
    background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:16px 0 6px;z-index:50}
  button.btn{
    border:none;border-radius:12px;padding:15px 22px;font-family:inherit;font-size:16px;
    font-weight:700;cursor:pointer;flex:1;min-width:160px;transition:.15s;
    display:flex;align-items:center;justify-content:center;gap:8px;min-height:52px
  }
  button.btn:disabled{opacity:.6;cursor:wait}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-primary:hover:not(:disabled){background:#16304f}
  .btn-ghost{background:#fff;color:var(--brand);border:1.5px solid var(--brand)}
  .btn-ghost:hover:not(:disabled){background:#f0f5fa}
  .msg{margin-top:12px;padding:12px 14px;border-radius:10px;font-weight:600;display:none}
  .msg.ok{background:#e7f6ee;color:var(--ok);border:1px solid #b7e4c9;display:block}
  .msg.err{background:#fdecea;color:var(--err);border:1px solid #f4c3bd;display:block}
  .note{font-size:13px;color:var(--muted);margin-top:6px}

  /* ---- Share overlay ---- */
  .share-overlay{
    display:none;position:fixed;inset:0;background:rgba(28,39,51,.55);
    z-index:999;align-items:center;justify-content:center;padding:20px;
    backdrop-filter:blur(3px);animation:fadeIn .2s ease
  }
  .share-overlay.show{display:flex}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .share-panel{
    background:#fff;border-radius:20px;padding:32px 26px;width:100%;max-width:400px;
    box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;position:relative;
    animation:slideUp .25s ease
  }
  @keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
  .share-close{
    position:absolute;top:12px;inset-inline-end:16px;background:none;border:none;
    font-size:28px;color:var(--muted);cursor:pointer;line-height:1;padding:4px 8px
  }
  .share-close:hover{color:var(--ink)}
  .share-panel .icon{font-size:48px;margin-bottom:8px}
  .share-panel h3{margin:0 0 4px;font-size:20px;color:var(--brand);font-weight:800}
  .share-panel .sub{margin:0 0 22px;font-size:14px;color:var(--muted)}
  .share-btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;border:none;border-radius:12px;padding:15px 20px;
    font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;
    margin-bottom:10px;transition:.15s;min-height:52px
  }
  .share-btn:last-child{margin-bottom:0}
  .share-btn .ic{font-size:20px}
  .share-native{background:var(--brand);color:#fff}
  .share-native:hover{background:#16304f}
  .share-wa{background:var(--wa);color:#fff}
  .share-wa:hover{background:#1da851}
  .share-email{background:#ea4335;color:#fff}
  .share-email:hover{background:#c5392a}
  .share-download{background:#f0f5fa;color:var(--brand);border:1.5px solid var(--brand)}
  .share-download:hover{background:#e3edf6}
  .share-hint{font-size:12.5px;color:var(--muted);margin-top:14px;line-height:1.5;
    background:#f8fafc;border-radius:8px;padding:10px}

  /* ---- spinner ---- */
  .spinner{
    width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);
    border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block
  }
  .spinner.dark{border-color:rgba(31,58,95,.2);border-top-color:var(--brand)}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---- PDF print view ---- */
  #pdf{display:none;width:794px;background:#fff;color:#1c2733;
    direction:rtl;text-align:right;font-family:'Heebo',Arial,sans-serif;margin:0 auto}
  #pdf.capturing{display:block}
  #pdf .p-head{background:var(--brand);color:#fff;padding:26px 34px;page-break-inside:avoid;break-inside:avoid}
  #pdf .p-head h1{margin:0;font-size:22px}
  #pdf .p-head p{margin:4px 0 0;font-size:13px;opacity:.9}
  #pdf .p-body{padding:22px 34px}
  #pdf .p-contact{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;
    background:#f4f8fc;border:1px solid #dbe6f0;border-radius:8px;padding:14px 18px;margin-bottom:16px;
    page-break-inside:avoid;break-inside:avoid}
  #pdf .p-contact div{font-size:13.5px}
  #pdf .p-contact b{color:var(--brand)}
  #pdf .p-q{margin:0 0 14px;page-break-inside:avoid;break-inside:avoid}
  #pdf .p-q .qt{font-weight:700;color:var(--brand);font-size:14px;margin-bottom:3px}
  #pdf .p-q .qa{font-size:13.5px;white-space:pre-wrap;border-bottom:1px solid #eee;padding-bottom:8px;min-height:16px}
  #pdf .p-sec{font-size:16px;font-weight:800;color:var(--brand);border-inline-start:4px solid var(--accent);
    padding-inline-start:10px;margin:20px 0 12px;page-break-inside:avoid;break-inside:avoid;
    page-break-after:avoid;break-after:avoid}
  #pdf .p-scn{background:#f6f9fc;border:1px dashed #9dbcd9;border-radius:6px;padding:8px 10px;
    font-size:12.5px;margin-bottom:5px;color:#22384f}
  #pdf .p-att{page-break-before:always;padding:22px 34px}
  #pdf .p-att h3{color:var(--brand);border-bottom:2px solid var(--accent);padding-bottom:6px}
  #pdf .p-att img{max-width:100%;max-height:900px;border:1px solid #ddd;border-radius:6px;margin:10px 0}
  #pdf .p-foot{font-size:11px;color:#8895a3;padding:6px 34px 18px;text-align:center}

  /* ---- mobile ---- */
  @media(max-width:640px){
    .wrap{padding:16px 12px 100px}
    .grid2,.upload-row{grid-template-columns:1fr}
    header.top{padding:22px 20px;border-radius:14px}
    header.top h1{font-size:21px}
    header.top p{font-size:13.5px}
    .card{padding:18px 16px 8px}
    .card h2{font-size:16px}
    .section-title{font-size:17px}
    input[type=text],input[type=tel],input[type=email],textarea{font-size:16px}
    .actions{gap:10px}
    button.btn{min-width:0;padding:14px 16px;font-size:15px}
    .actions .btn-primary{flex:1.3}
    .actions .btn-ghost{flex:.8}
    .share-panel{padding:26px 20px;border-radius:16px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <img class="logo" id="company-logo" src="logo.png" alt="לוגו" onerror="this.style.display='none';this.dataset.hidden='1'">
    <h1>טופס ראיון עבודה – מהנדס / מנהל עבודה בבנייה</h1>
    <p>נא למלא את הפרטים והשאלות. בסיום ניתן להוריד קובץ PDF ולשתף אותו בקלות.</p>
  </header>

  <form id="form" novalidate>
    <!-- Contact -->
    <div class="card">
      <h2><span class="num">✓</span> פרטים אישיים</h2>
      <div class="grid2">
        <div class="q"><label>שם מלא</label>
          <input type="text" name="fullname"></div>
        <div class="q"><label>תפקיד מבוקש</label>
          <input type="text" name="position" placeholder="מהנדס ביצוע / מנהל עבודה"></div>
        <div class="q"><label>טלפון</label>
          <input type="tel" name="phone"></div>
        <div class="q"><label>דוא"ל</label>
          <input type="email" name="email"></div>
      </div>
    </div>

    <div id="questions"></div>

    <!-- Uploads -->
    <div class="card">
      <h2><span class="num">📎</span> צירוף מסמכים</h2>
      <div class="upload-row">
        <label class="drop" id="drop-id">
          <b>תעודת זהות</b>
          <small>צילום / סריקה (JPG, PNG, PDF)</small>
          <input type="file" id="file-id" accept="image/*,.pdf" multiple>
        </label>
        <label class="drop" id="drop-cert">
          <b>תעודה רלוונטית</b>
          <small>רישיון / תעודת מהנדס / הסמכה (JPG, PNG, PDF)</small>
          <input type="file" id="file-cert" accept="image/*,.pdf" multiple>
        </label>
      </div>
      <div class="thumbs" id="thumbs-id"></div>
      <div class="thumbs" id="thumbs-cert"></div>
      <p class="note">התמונות (JPG/PNG) יוטמעו בקובץ ה‑PDF. קובצי PDF יצורפו ידנית בעת השיתוף.</p>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-primary" id="btn-share">
        📤 יצירת PDF ושיתוף
      </button>
    </div>
    <div class="msg" id="msg"></div>
  </form>
</div>

<!-- Share overlay -->
<div class="share-overlay" id="share-overlay">
  <div class="share-panel">
    <button class="share-close" id="share-close" type="button">×</button>
    <div class="icon" id="share-icon">✅</div>
    <h3>ה‑PDF מוכן לשיתוף</h3>
    <p class="sub" id="share-sub">בחרו כיצד תרצו לשלוח את הטופס</p>
    <button class="share-btn share-native" id="s-native" type="button">
      <span class="ic">📤</span> שיתוף דרך הטלפון
    </button>
    <button class="share-btn share-wa" id="s-whatsapp" type="button">
      <span class="ic">💬</span> שליחה ב‑WhatsApp
    </button>
    <button class="share-btn share-email" id="s-email" type="button">
      <span class="ic">✉️</span> שליחה באימייל
    </button>
    <button class="share-btn share-download" id="s-download" type="button">
      <span class="ic">⬇️</span> הורדת הקובץ
    </button>
    <div class="share-hint" id="share-hint"></div>
  </div>
</div>

<div id="pdf"></div>

<script>
/* ============================================================
   QUESTIONS DATA
   ============================================================ */
const QUESTIONS = [
  {q:"ספר על עצמך ועל הניסיון המקצועי שלך בפרויקטי בנייה."},
  {q:"אילו סוגי פרויקטים ניהלת? (מגורים / ציבורי / מסחרי / תשתיות / תמ\"א וכו')."},
  {q:"מה היה תפקידך בפועל באתר? פרט תחומי אחריות, מספר עובדים וקבלני משנה שניהלת."},
  {q:"כיצד אתה מנהל לוחות זמנים ומטפל בפיגורים?"},
  {q:"תאר מקרה של תקלה משמעותית באתר וכיצד פתרת אותה."},
  {q:"כיצד אתה פועל כאשר יש סתירה בין תוכניות אדריכלות, קונסטרוקציה ומערכות?"},
  {q:"כיצד אתה מבצע בקרת איכות ליציקות בטון, ברזל וטפסנות?"},
  {q:"כיצד אתה מנהל את נושא הבטיחות באתר?"},
  {q:"כיצד אתה מתמודד עם עימות מול קבלן משנה או מזמין העבודה?"},
  {q:"מהן ציפיות השכר שלך ומה זמינותך לתחילת עבודה?"},
  {q:"איפה אתה רואה את עצמך בעוד 3–5 שנים?"},
  {q:"האם יש לך שאלות אלינו?"},
];
const ENG = [
  {q:"במהלך בדיקת ברזל לפני יציקה גילית כי המרווחים בין המוטות אינם תואמים לתוכנית וחסרים ספייסרים. כיצד תפעל? פרט את סדר הפעולות."},
  {q:"במהלך חפירה לבניין עם שלושה מרתפים מתגלים מים בקרקע ותזוזות בקיר הדיפון. מהם הסיכונים המיידיים, אילו בדיקות תדרוש ומה יהיו הפעולות הראשונות שלך לפני המשך העבודה?"},
];

/* ============================================================
   UTILITIES
   ============================================================ */
function escapeAttr(s){return esc(s).replace(/"/g,String.fromCharCode(38)+'quot;');}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function val(n){return document.querySelector(`[name="${n}"]`)?.value.trim()||'';}

/* ============================================================
   RENDER QUESTION CARDS
   ============================================================ */
const qWrap = document.getElementById('questions');
QUESTIONS.forEach((item,i)=>{
  const c=document.createElement('div');c.className='card';
  c.innerHTML=`<h2><span class="num">${i+1}</span> ${item.q}</h2>
    <div class="q"><textarea name="q${i}" data-q="${escapeAttr(item.q)}"></textarea></div>`;
  qWrap.appendChild(c);
});
const secTitle=document.createElement('div');
secTitle.className='section-title';secTitle.textContent='שאלות הנדסיות';
qWrap.appendChild(secTitle);
ENG.forEach((item,i)=>{
  const c=document.createElement('div');c.className='card';
  c.innerHTML=`<h2><span class="num">${i+13}</span> שאלה הנדסית</h2>
    <div class="scenario">${item.q}</div>
    <div class="q"><textarea name="e${i}" data-q="${escapeAttr(item.q)}"></textarea></div>`;
  qWrap.appendChild(c);
});

/* ============================================================
   FILE HANDLING
   ============================================================ */
const store={id:[],cert:[]};
function setupUpload(inputId,key,thumbsId){
  const input=document.getElementById(inputId);
  const thumbs=document.getElementById(thumbsId);
  input.addEventListener('change',e=>{
    [...e.target.files].forEach(f=>store[key].push(f));
    input.value='';renderThumbs(key,thumbs);
  });
}
function renderThumbs(key,thumbs){
  thumbs.innerHTML='';
  store[key].forEach((f,idx)=>{
    const t=document.createElement('div');t.className='t';
    if(f.type.startsWith('image/')){
      const img=document.createElement('img');img.src=URL.createObjectURL(f);t.appendChild(img);
    }else{
      const d=document.createElement('div');d.className='file-ic';d.textContent='📄 '+f.name;t.appendChild(d);
    }
    const rm=document.createElement('button');rm.type='button';rm.textContent='×';
    rm.onclick=()=>{store[key].splice(idx,1);renderThumbs(key,thumbs);};
    t.appendChild(rm);thumbs.appendChild(t);
  });
}
setupUpload('file-id','id','thumbs-id');
setupUpload('file-cert','cert','thumbs-cert');

/* ============================================================
   LOCALSTORAGE AUTO-SAVE
   ============================================================ */
const LS_KEY='narsha_interview_form';
function saveForm(){
  const data={};
  document.querySelectorAll('input[name],textarea[name]').forEach(el=>{
    data[el.name]=el.value;
  });
  try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch(e){}
}
function loadForm(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return;
    const data=JSON.parse(raw);
    Object.entries(data).forEach(([k,v])=>{
      const el=document.querySelector(`[name="${k}"]`);
      if(el)el.value=v;
    });
  }catch(e){}
}
loadForm();
document.getElementById('form').addEventListener('input',saveForm);

function readImg(f){return new Promise(res=>{
  if(!f.type.startsWith('image/'))return res(null);
  const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(f);
});}

/* ============================================================
   PDF GENERATION
   ============================================================ */
async function buildPdfDom(){
  const g=n=>document.querySelector(`[name="${n}"]`)?.value.trim()||'';
  const pdf=document.getElementById('pdf');
  let qs='';
  QUESTIONS.forEach((item,i)=>{
    qs+=`<div class="p-q"><div class="qt">${i+1}. ${esc(item.q)}</div>
      <div class="qa">${esc(g('q'+i))||'—'}</div></div>`;
  });
  let es='<div class="p-sec">שאלות הנדסיות</div>';
  ENG.forEach((item,i)=>{
    es+=`<div class="p-q"><div class="p-scn">${i+13}. ${esc(item.q)}</div>
      <div class="qa">${esc(g('e'+i))||'—'}</div></div>`;
  });
  // attachments (images only, embedded)
  const imgs=[...store.id,...store.cert].filter(f=>f.type.startsWith('image/'));
  const labels=[...store.id.map(_=>'תעודת זהות'),...store.cert.map(_=>'תעודה רלוונטית')]
      .filter((_,i)=>[...store.id,...store.cert][i].type.startsWith('image/'));
  let att='';
  if(imgs.length){
    att='<div class="p-att"><h3>מסמכים מצורפים</h3>';
    for(let i=0;i<imgs.length;i++){
      const data=await readImg(imgs[i]);
      att+=`<div style="page-break-inside:avoid"><b>${labels[i]||'מסמך'}</b><br><img src="${data}"></div>`;
    }
    att+='</div>';
  }
  const today=new Date().toLocaleDateString('he-IL');
  pdf.innerHTML=`
    <div class="p-head">
      <h1>טופס ראיון עבודה – מהנדס / מנהל עבודה בבנייה</h1>
      <p>תאריך מילוי: ${today}</p>
    </div>
    <div class="p-body">
      <div class="p-contact">
        <div><b>שם מלא:</b> ${esc(g('fullname'))}</div>
        <div><b>תפקיד מבוקש:</b> ${esc(g('position'))}</div>
        <div><b>טלפון:</b> ${esc(g('phone'))}</div>
        <div><b>דוא"ל:</b> ${esc(g('email'))}</div>
      </div>
      ${qs}${es}
    </div>
    ${att}
    <div class="p-foot">הופק אוטומטית מטופס הראיון המקוון</div>`;
  return pdf;
}

async function generatePdfBlob(){
  const dom=await buildPdfDom();
  dom.classList.add('capturing');

  // Wait for fonts
  if(document.fonts&&document.fonts.ready){try{await document.fonts.ready;}catch(e){}}

  // Wait for all images in PDF DOM to fully load
  const pdfImgs=[...dom.querySelectorAll('img')];
  await Promise.all(pdfImgs.map(img=>{
    if(img.complete&&img.naturalWidth>0)return Promise.resolve();
    return new Promise(res=>{
      img.onload=res;img.onerror=res;
      setTimeout(res,5000);
    });
  }));

  // Extra settle time for layout
  await new Promise(r=>setTimeout(r,300));

  const name=(document.querySelector('[name=fullname]').value.trim()||'מועמד').replace(/\s+/g,'_');
  const filename=`ראיון_${name}.pdf`;

  const opt={
    margin:[10,0,12,0],
    filename:filename,
    image:{type:'jpeg',quality:.95},
    html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
    pagebreak:{mode:['avoid-all','css','legacy']}
  };

  try{
    // Use html2pdf Worker API to get blob (same proven engine as .save())
    const worker=html2pdf().set(opt).from(dom);
    const pdf=await worker.toPdf().get('pdf');
    const blob=pdf.output('blob');
    return{blob,filename};
  }catch(e){
    console.error('PDF generation error:',e);
    throw e;
  }finally{
    dom.classList.remove('capturing');
  }
}

// Direct download fallback (known working method from original)
async function downloadPdfDirect(){
  const dom=await buildPdfDom();
  dom.classList.add('capturing');

  // Remember scroll position
  const scrollY=window.scrollY;
  // Scroll to top so html2canvas captures from the right position
  window.scrollTo(0,0);

  if(document.fonts&&document.fonts.ready){try{await document.fonts.ready;}catch(e){}}

  // Wait for images
  const pdfImgs=[...dom.querySelectorAll('img')];
  await Promise.all(pdfImgs.map(img=>{
    if(img.complete&&img.naturalWidth>0)return Promise.resolve();
    return new Promise(res=>{img.onload=res;img.onerror=res;setTimeout(res,5000);});
  }));

  await new Promise(r=>setTimeout(r,300));

  const name=(document.querySelector('[name=fullname]').value.trim()||'מועמד').replace(/\s+/g,'_');
  const filename=`ראיון_${name}.pdf`;
  const opt={
    margin:[10,0,12,0],filename:filename,
    image:{type:'jpeg',quality:.95},
    html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff',x:0,y:0,scrollX:0,scrollY:0},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
    pagebreak:{mode:['avoid-all','css','legacy']}
  };
  try{
    await html2pdf().set(opt).from(dom).save();
  }finally{
    dom.classList.remove('capturing');
    window.scrollTo(0,scrollY); // restore scroll
  }
}

function downloadBlob(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.rel='noopener';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
}

/* ============================================================
   MESSAGES
   ============================================================ */
function showMsg(type,text){
  const m=document.getElementById('msg');m.className='msg '+type;m.textContent=text;
  m.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ============================================================
   SHARE OVERLAY
   ============================================================ */
let lastPdf=null; // {blob, filename}

const overlay=document.getElementById('share-overlay');
const sNative=document.getElementById('s-native');
const sWhatsapp=document.getElementById('s-whatsapp');
const sEmail=document.getElementById('s-email');
const sDownload=document.getElementById('s-download');
const shareHint=document.getElementById('share-hint');
const shareIcon=document.getElementById('share-icon');
const shareSub=document.getElementById('share-sub');

function openSharePanel(pdfResult){
  lastPdf=pdfResult;

  // Detect native share with file support
  const file=new File([pdfResult.blob],pdfResult.filename,{type:'application/pdf'});
  const canShareFile = !!(navigator.canShare && navigator.canShare({files:[file]}));

  if(canShareFile){
    sNative.style.display='flex';
    sNative._file=file;
    shareHint.textContent='לחצו על "שיתוף דרך הטלפון" כדי לפתוח את התפריט ולבחור את WhatsApp / אימייל / SMS ועוד.';
  }else{
    sNative.style.display='none';
    // Auto-download on desktop so user has the file to attach
    downloadBlob(pdfResult.blob,pdfResult.filename);
    shareHint.textContent='הקובץ הורד למכשיר. פתחו את WhatsApp או האימייל וצרפו אותו ידנית.';
  }

  overlay.classList.add('show');
}

function closeSharePanel(){
  overlay.classList.remove('show');
}

document.getElementById('share-close').addEventListener('click',closeSharePanel);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeSharePanel();});

sNative.addEventListener('click',async()=>{
  if(!sNative._file)return;
  try{
    await navigator.share({
      files:[sNative._file],
      title:'טופס ראיון עבודה',
      text:'מצורף טופס ראיון עבודה בקובץ PDF'
    });
    showMsg('ok','הטופס שותף בהצלחה!');
  }catch(e){
    if(e.name!=='AbortError'){
      console.error(e);
    }
  }
});

sDownload.addEventListener('click',()=>{
  if(lastPdf)downloadBlob(lastPdf.blob,lastPdf.filename);
});

sWhatsapp.addEventListener('click',()=>{
  const name=val('fullname');
  const text=encodeURIComponent(`שלום, מצורף טופס ראיון עבודה${name?' של '+name:''}.\n(יש לצרף את קובץ ה-PDF שהורד)`);
  window.open(`https://wa.me/?text=${text}`,'_blank');
});

sEmail.addEventListener('click',()=>{
  const name=val('fullname');
  const subject=encodeURIComponent(`טופס ראיון עבודה${name?' – '+name:''}`);
  const body=encodeURIComponent(
    `שלום,\n\nמצורף טופס ראיון עבודה${name?' של '+name:''} בקובץ PDF.\n\nפרטי קשר:\n` +
    `טלפון: ${val('phone')}\nדוא"ל: ${val('email')}\n\n(יש לצרף את קובץ ה-PDF שהורד)`
  );
  window.location.href=`mailto:?subject=${subject}&body=${body}`;
});

/* ============================================================
   BUTTONS
   ============================================================ */
const btnShare=document.getElementById('btn-share');

function setLoading(btn,loading){
  if(loading){
    btn.dataset.origText=btn.innerHTML;
    btn.innerHTML='<span class="spinner"></span> מכין קובץ PDF…';
    btn.disabled=true;
  }else{
    btn.innerHTML=btn.dataset.origText||btn.innerHTML;
    btn.disabled=false;
  }
}

btnShare.addEventListener('click',async()=>{
  setLoading(btnShare,true);
  showMsg('ok','מכין קובץ PDF…');
  try{
    // Use proven .save() method that works, then show share options
    await downloadPdfDirect();
    showMsg('ok','ה‑PDF הורד. בחרו כיצד לשתף אותו:');
    overlay.classList.add('show');
    sNative.style.display='none'; // no blob for native share, but download links work
    shareHint.textContent='הקובץ הורד למכשיר. בחרו אפשרות שיתוף וצרפו את הקובץ שהורד.';
  }catch(e){
    showMsg('err','אירעה שגיאה בהפקת ה‑PDF.');console.error(e);
  }
  setLoading(btnShare,false);
});

/* ============================================================
   PREVENT ACCIDENTAL PAGE LEAVE WITH DATA
   ============================================================ */
window.addEventListener('beforeunload',e=>{
  const hasData=document.querySelector('[name=fullname]').value.trim()||
    [...document.querySelectorAll('textarea')].some(t=>t.value.trim());
  if(hasData){e.preventDefault();e.returnValue='';}
});
