<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טופס ראיון עבודה – מהנדס / מנהל עבודה בבנייה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">
  <header class="top">
    <img class="logo" src="logo.png" alt="לוגו" onerror="this.style.display='none'">
    <h1>טופס ראיון עבודה – מהנדס / מנהל עבודה בבנייה</h1>
    <p>נא למלא את הפרטים והשאלות. בסיום ניתן להוריד קובץ PDF ולשתף אותו בקלות.</p>
  </header>

  <form id="form" novalidate>
    <!-- Contact -->
    <div class="card">
      <h2><span class="num">✓</span> פרטים אישיים</h2>
      <div class="grid2">
        <div class="q"><label>שם מלא</label><input type="text" name="fullname"></div>
        <div class="q"><label>תפקיד מבוקש</label><input type="text" name="position" placeholder="מהנדס ביצוע / מנהל עבודה"></div>
        <div class="q"><label>טלפון</label><input type="tel" name="phone"></div>
        <div class="q"><label>דוא"ל</label><input type="email" name="email"></div>
      </div>
    </div>

    <div id="questions"></div>

    <!-- Uploads -->
    <div class="card">
      <h2><span class="num">📎</span> צירוף מסמכים</h2>
      <div class="upload-row">
        <label class="drop" for="file-id">
          <b>תעודת זהות</b>
          <small>צילום / סריקה (JPG, PNG)</small>
          <input type="file" id="file-id" accept="image/*" multiple>
        </label>
        <label class="drop" for="file-cert">
          <b>תעודה רלוונטית</b>
          <small>רישיון / תעודת מהנדס / הסמכה (JPG, PNG)</small>
          <input type="file" id="file-cert" accept="image/*" multiple>
        </label>
      </div>
      <div class="thumbs" id="thumbs-id"></div>
      <p class="upload-err" id="err-id" role="alert"></p>
      <div class="thumbs" id="thumbs-cert"></div>
      <p class="upload-err" id="err-cert" role="alert"></p>
      <p class="note">התמונות יוטמעו אוטומטית בקובץ ה-PDF ונשמרות בדפדפן עד לשליחה.</p>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-primary" id="btn-share">📤 יצירת PDF ושיתוף</button>
    </div>
    <div class="msg" id="msg" role="status" aria-live="polite"></div>
  </form>
</div>

<!-- Share overlay -->
<div class="share-overlay" id="share-overlay">
  <div class="share-panel">
    <button class="share-close" id="share-close" type="button">×</button>
    <div class="icon">✅</div>
    <h3>ה-PDF מוכן לשיתוף</h3>
    <p class="sub">בחרו כיצד תרצו לשלוח את הטופס</p>
    <button class="share-btn share-native" id="s-native" type="button"><span class="ic">📤</span> שיתוף דרך הטלפון</button>
    <button class="share-btn share-wa" id="s-whatsapp" type="button"><span class="ic">💬</span> שליחה ב-WhatsApp</button>
    <button class="share-btn share-email" id="s-email" type="button"><span class="ic">✉️</span> שליחה באימייל</button>
    <button class="share-btn share-download" id="s-download" type="button"><span class="ic">⬇️</span> הורדת הקובץ</button>
    <div class="share-hint" id="share-hint"></div>
  </div>
</div>

<script src="vendor/jspdf-2.5.1.umd.min.js"></script>
<script src="questions.js"></script>
<script src="pdf.js"></script>
<script src="app.js"></script>
</body>
</html>
